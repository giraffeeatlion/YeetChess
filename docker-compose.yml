version: '3.9'

services:
  db:
    image: postgres:15
    container_name: yeetchess_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-yeetchess}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-yeetchess_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-yeetchess}
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-yeetchess}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - yeetchess_network

  redis:
    image: redis:7-alpine
    container_name: yeetchess_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - yeetchess_network

volumes:
  postgres_data:
  redis_data:

networks:
  yeetchess_network:
    driver: bridge
